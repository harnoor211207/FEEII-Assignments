<html lang="en">
<head>

    <title>Document</title>

    <!--EXTERNAL CSS-->
    <link rel="stylesheet" href="praccss.css">
    
    <!--INTERNAL CSS-->
    <style>
        <!--UNIVERSAL SELECTOR-->
        *{
            color: greenyellow;
        }
        <!--CLASS SELECTOR-->
        .paraclass{
            color: brown;
        }
        <!--ID SELECTOR-->
        #para{

        p{
            color:blue;
        }
    </style>
</head>
<body>
    <h1>CHITKARA UNIVERSITY</h1>

    <!--INLINCE CSS (more precedence/specificity than internal css.)-->
    <p id="para" class ="paraclass" style="color:rgb(249, 71, 16) ; font-size: 32px;" >Hi,Good Morning!</p>

    <div class ="box">
