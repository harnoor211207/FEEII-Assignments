<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}
body {
        margin: 0;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        background: linear-gradient(45deg, rgb(108, 134, 195), rgb(110, 207, 245));
        overflow-x: hidden;
      }
#navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        min-height: 84px;
        width: 100%;
        padding: 22px 24px 22px 4vw;
        background: rgb(78, 84, 146);
        color: #fff;
        border-radius: 10px;
      }
.logo {
        font-size: 1.5rem;
        font-weight: bold;
        color: #fff;
        text-decoration: none;
      }
.nav-menu {
        display: flex;
        align-items: center;
        gap: 20px;
        flex: 1;
        justify-content: center;
      }
      .nav-link {
        color: #fff;
        text-decoration: none;
        font-size: 1.05rem;
        font-weight: 600;
        padding: 10px 16px;
      }
      .login {
        position: relative;
        padding: 34px 24px 28px;
        backdrop-filter: blur(18px) saturate(160%);
        -webkit-backdrop-filter: blur(18px) saturate(160%);
        background: rgba(255, 255, 255, 0.14);
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
        width: min(24rem, 90vw);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        color: #fff;
        border-radius: 24px;
        text-align: center;
      }
      .login.is-hidden {
        display: none;
      }
        .close-btn {
        position: absolute;
        top: 12px;
        right: 12px;
        width: 34px;
        height: 34px;
        border: 1px solid rgba(255, 255, 255, 0.35);
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.14);
        color: #fff;
        font-size: 1.2rem;
        line-height: 1;
        cursor: pointer;
        display: grid;
        place-items: center;
        transition: background 0.2s ease, transform 0.2s ease;
      }
      .close-btn:hover {
        background: rgba(255, 255, 255, 0.24);
        transform: scale(1.05);
      }
      .login h1 {
        margin: 0;
        font-size: 2rem;
      }
      .login p {
        margin: 0;
      }
      .content {
        display: flex;
        justify-content: center;
        align-items: center;
        flex: 1;
        padding: 24px 16px;
        backdrop-filter: blur(18px) saturate(160%);
        -webkit-backdrop-filter: blur(18px) saturate(160%);
      }
      .container {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
      }
      .email, .pass {
        width: 100%;
        padding: 15px 16px;
        margin: 4px 0;
        border: none;
        border-radius: 12px;
        outline: none;
        font-size: 1rem;
        background: rgba(255, 255, 255, 0.95);
        color: #2b2250;
      }
      .email::placeholder,
      .pass::placeholder {
        color: #8a86a8;
      }
      .btn {
          background: transparent;
        background:rgb(182, 118, 75);
        border: none;
        border-radius: 12px;
        color: #fff;
        cursor: pointer;
        padding: 14px;
        width: 100%;
        font-size: 1.15rem;
        font-weight: 600;
      }
      .fpass {
        color: #fff;
        text-decoration: none;
        font-size: 1rem;
      }
      .sign {
        color: #fff188;
        text-decoration: none;
        font-size: 1rem;
      }
      .sign {
        color: #fff188;
        text-decoration: none; 
        font-size: 1rem;
      }
      .notification {
        position: relative;
        display: inline-block;
        height: 38px;
        width: 38px;
      }
      .Notification img {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
      }
      .notification-count {
        position: absolute;
        top: -5%;
        right: 5%;
        background-color: red;
        color: white;
        border-radius: 50%;
        padding: 2px 6px;
        font-size: 12px;
      }
      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        min-height: 84px;
        width: 100%;
        padding: 22px 24px 22px 4vw;
        background: linear-gradient(45deg, rgb(103, 82, 198), rgb(86, 41, 150));
        color: #fff;
        border-radius: 10px;
      }
      .login {
          width: min(24rem, 92vw);
          padding: 30px 18px 24px;
          border-radius: 20px;
        }

        .logo {
          font-size: 1.25rem;
        }

        .nav-menu {
          gap: 10px;
          flex-wrap: wrap;
          justify-content: flex-middle;
        }

        .nav-link {
          font-size: 0.9rem;
          padding: 8px 12px;
        }

        .notification {
          width: 34px;
          height: 34px;
        }

        .login h1 {
          font-size: 1.6rem;
        }

        .close-btn {
          width: 30px;
          height: 30px;
          top: 10px;
          right: 10px;
        }
      
      .circle1{
        border-radius: 50%;
        background: rgb(173, 243, 166);
        position:absolute;
        top: 20%;
        right: 62%;

        width: 200px;
        height: 200px;
        z-index: -1;
      }
      .circle2{
        border-radius: 50%;
        background: rgb(217, 228, 119);
        position:absolute;
        bottom: 15%;
        left: 62%;

        width: 150px;
        height: 150px;
        z-index: -1;
      }
      .chat{
        display: flex;
        justify-content: center;
        width: 70px;
        height: 70px;
        background: rgb(7, 132, 7);
        right : 2px;
        bottom: 10px;
        border-radius: 50%;
        position: fixed;
        align-items: center;
      }
      
      .chatimg{
        width: 50px;
        height: 50px;
        border-radius: 50% ;
      }

      .circle3{
        border-radius: 50%;
        height:100px;
        width:100px
      }
</style>
</head>
<body>
    <nav id="navbar" class="navbar">
      <div class="logo">Harnoor Singh</div>
      <div class="nav-menu">
        <a href="#home" class="nav-link">Home</a>
        <a href="#about" class="nav-link">About</a>
        <a href="#contact" class="nav-link">Contact</a>
      </div>
      <div class="notification">
        <img src="https://cdn-icons-png.flaticon.com/128/8509/8509088.png" alt="Notification" width="30" height="30" />
        <div class="notification-count">4</div>
      </div>
    </nav>
    <div class="circle1"></div>
    <section class="content">
      <div class="container">
        <div class="login">
          <button type="button" class="close-btn" aria-label="Close login box">&times;</button>
          <h1>Welcome Back</h1>
          <p style="font-weight: 800; font-size: larger;">Login to continue</p>
          <input type="email" placeholder="Email" class="email"/>
          <input type="password" placeholder="Password" class="pass" />
          <button class="btn">Login</button>
          <p><a href="#forgot-password" class="fpass">Forgot password?</a></p>
          <p>Don't have an account? <a href="#signup" class="sign">Sign up</a></p>
        </div>
      </div>
    </section>
    <div class="circle2"></div>
        <div class="chat">
            <img src="chat.png" alt="" class="chatimg">
        </div>
        <div class="circle3"></div>
</body>
</html>
